<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
    }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 0.5rem;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone-icon { font-size: 1.75rem; }
    .drop-zone-label { font-size: 0.8125rem; color: #64748b; margin-top: 0.375rem; line-height: 1.4; }

    #file-list { list-style: none; display: flex; flex-direction: column; gap: 0.2rem; }
    #file-list li {
      font-size: 0.8125rem;
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0.1rem 0;
    }
    #file-list li::before { content: "📄 "; }

    .btn {
      width: 100%;
      padding: 0.625rem;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    #ingest-status {
      font-size: 0.8125rem;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      line-height: 1.5;
      display: none;
    }
    #ingest-status.success { display: block; background: #dcfce7; color: #166534; }
    #ingest-status.error   { display: block; background: #fee2e2; color: #991b1b; }

    .sidebar-note {
      font-size: 0.75rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid #f1f5f9;
    }

    /* ── Chat area ─────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      flex-shrink: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #94a3b8;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .empty-state-title { font-size: 0.9375rem; }
    .empty-state-hint { font-size: 0.8125rem; margin-top: 0.25rem; }

    /* ── Messages ──────────────────────────────────────────────── */
    .msg { display: flex; flex-direction: column; max-width: 78%; }
    .msg.user      { align-self: flex-end;   align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      font-size: 0.9375rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }
    .msg.assistant .msg-bubble {
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 0.25rem;
    }
    .msg.assistant .msg-bubble.insufficient {
      background: #fffbeb;
      border-color: #fbbf24;
      color: #92400e;
    }
    .msg.assistant .msg-bubble.error-bubble {
      background: #fff1f2;
      border-color: #fda4af;
      color: #9f1239;
    }

    .msg-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      align-items: center;
      margin-top: 0.375rem;
      padding: 0 0.25rem;
    }

    .citation {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 9999px;
      padding: 0.125rem 0.5rem;
      font-size: 0.6875rem;
      color: #475569;
      white-space: nowrap;
    }

    .flagged-warning {
      font-size: 0.75rem;
      color: #b45309;
      font-style: italic;
    }

    /* ── Typing indicator ──────────────────────────────────────── */
    .dots { display: flex; align-items: center; gap: 4px; height: 1rem; }
    .dots span {
      display: block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Input area ────────────────────────────────────────────── */
    .chat-input-area {
      padding: 1rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      resize: none;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      overflow-y: auto;
      max-height: 140px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #chat-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px #dbeafe;
    }
    #chat-input:disabled { background: #f8fafc; }

    #send-btn {
      padding: 0.625rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #1d4ed8; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<aside class="sidebar">
  <p class="sidebar-title">PDF Ingest</p>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple accept=".pdf">
    <div class="drop-zone-icon">📁</div>
    <p class="drop-zone-label">Click to select PDFs<br>or drag &amp; drop here</p>
  </div>

  <ul id="file-list"></ul>

  <button class="btn btn-primary" id="ingest-btn" disabled>Ingest PDFs</button>
  <div id="ingest-status"></div>

  <p class="sidebar-note">
    The knowledge base resets on server restart — re-ingest your PDFs if you restart the server.
  </p>
</aside>

<div class="chat-area">
  <div class="chat-header">RAG Assistant</div>

  <div class="chat-messages" id="chat-messages">
    <div class="empty-state">
      <div class="empty-state-icon">💬</div>
      <div class="empty-state-title">Ask a question about your documents</div>
      <div class="empty-state-hint">Upload and ingest PDFs first, then start chatting</div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="chat-input" rows="1"
      placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const fileInput   = document.getElementById('file-input');
  const dropZone    = document.getElementById('drop-zone');
  const fileList    = document.getElementById('file-list');
  const ingestBtn   = document.getElementById('ingest-btn');
  const ingestStatus = document.getElementById('ingest-status');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput   = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('send-btn');

  // Track selected files separately so drag-drop and input both work
  let selectedFiles = [];

  // ── File selection ────────────────────────────────────────────

  function renderFileList() {
    fileList.innerHTML = '';
    selectedFiles.forEach(f => {
      const li = document.createElement('li');
      li.textContent = f.name;
      fileList.appendChild(li);
    });
    ingestBtn.disabled = selectedFiles.length === 0;
  }

  fileInput.addEventListener('change', () => {
    selectedFiles = Array.from(fileInput.files);
    renderFileList();
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.pdf'));
    renderFileList();
  });

  // ── Ingest ───────────────────────────────────────────────────

  ingestBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;

    ingestBtn.disabled = true;
    ingestBtn.textContent = 'Ingesting…';
    ingestStatus.className = '';
    ingestStatus.textContent = '';

    const form = new FormData();
    selectedFiles.forEach(f => form.append('files', f));

    try {
      const res = await fetch('/ingest', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `Server error ${res.status}`);

      const summary = data.results
        .map(r => `${r.filename} (${r.chunks_created} chunks)`)
        .join(', ');
      ingestStatus.className = 'success';
      ingestStatus.textContent = `✓ Ingested: ${summary}`;

      selectedFiles = [];
      fileInput.value = '';
      renderFileList();
    } catch (err) {
      ingestStatus.className = 'error';
      ingestStatus.textContent = `✗ ${err.message}`;
    } finally {
      ingestBtn.textContent = 'Ingest PDFs';
      ingestBtn.disabled = selectedFiles.length === 0;
    }
  });

  // ── Chat helpers ─────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function clearEmptyState() {
    const el = chatMessages.querySelector('.empty-state');
    if (el) el.remove();
  }

  function appendBubble(role, innerHtml) {
    clearEmptyState();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = innerHtml;
    chatMessages.appendChild(wrap);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return wrap;
  }

  function showTypingIndicator() {
    return appendBubble('assistant', `
      <div class="msg-bubble">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    `);
  }

  function buildAssistantHtml(data) {
    const insufficient = data.insufficient_evidence;
    const hasFlags     = data.flagged_claims && data.flagged_claims.length > 0;

    const bubbleClass = insufficient ? 'msg-bubble insufficient' : 'msg-bubble';
    const answerHtml  = `<div class="${bubbleClass}">${esc(data.answer || '')}</div>`;

    let footerItems = '';

    if (data.citations && data.citations.length > 0) {
      footerItems += data.citations
        .map(c => `<span class="citation">📄 ${esc(c.filename)} p.${c.page}</span>`)
        .join('');
    }

    if (hasFlags) {
      footerItems += `<span class="flagged-warning">⚠ some claims may need verification</span>`;
    }

    const footer = footerItems
      ? `<div class="msg-footer">${footerItems}</div>`
      : '';

    return answerHtml + footer;
  }

  // ── Send query ────────────────────────────────────────────────

  async function sendQuery() {
    const text = chatInput.value.trim();
    if (!text || sendBtn.disabled) return;

    chatInput.value = '';
    autoResize();
    sendBtn.disabled = true;
    chatInput.disabled = true;

    appendBubble('user', `<div class="msg-bubble">${esc(text)}</div>`);

    const indicator = showTypingIndicator();

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text }),
      });

      const data = await res.json();
      indicator.remove();

      if (!res.ok) {
        appendBubble('assistant', `
          <div class="msg-bubble error-bubble">
            ✗ ${esc(data.detail || `Server error (${res.status})`)}
          </div>
        `);
        return;
      }

      appendBubble('assistant', buildAssistantHtml(data));
    } catch (err) {
      indicator.remove();
      appendBubble('assistant', `
        <div class="msg-bubble error-bubble">
          ✗ Could not reach the server — please check your connection and try again.
        </div>
      `);
    } finally {
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendQuery);

  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  });

  // Auto-resize textarea as user types
  function autoResize() {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
  }
  chatInput.addEventListener('input', autoResize);
</script>
</body>
</html>
